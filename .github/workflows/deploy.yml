name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]   # troque se usar outra branch
  workflow_dispatch:    # permite disparar manualmente

permissions:
  contents: read
  pages: write
  id-token: write  # necessário p/ deploy-pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install, build e gera artefato
        uses: withastro/action@v4         # cuida do pnpm install + astro build
        with:
          node-version: '20'  # versão do Node.js
          package-manager: pnpm@10       # opcional – força versão

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
